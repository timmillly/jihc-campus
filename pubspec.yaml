name: jihc_campus_app
description: JIHC Campus Events & News App - by Kaisarbai Akniyet

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_storage: ^13.4.1
  google_sign_in: ^7.2.0
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0
  intl: ^0.20.2
  uuid: ^4.2.2
  connectivity_plus: ^7.1.1
  flutter_spinkit: ^5.2.0
  timeago: ^3.6.0
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
